<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vitre UI</title>
    <meta
      name="description"
      content="Placeholder site for the Vitre CSS and Vitre JS projects."
    >
    <style>
      :root {
        color-scheme: light;
        --ink: #08142f;
        --blue: #0a84ff;
        --line: rgba(8, 20, 47, 0.12);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background: #f8fbff;
      }

      main {
        min-height: 100vh;
        overflow: hidden;
      }

      .hero {
        position: relative;
        width: min(100vw, 1920px);
        margin: 0 auto;
      }

      .brand {
        display: block;
        width: 100%;
        height: auto;
      }

      .links {
        position: absolute;
        top: 75%;
        left: 65%;
        display: flex;
        gap: 0.875rem;
        justify-content: center;
        width: min(100% - 2rem, 34rem);
        transform: translate(-50%, -50%);
      }

      .links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 9.5rem;
        min-height: 3rem;
        padding: 0.75rem 1.1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 18px 50px rgba(8, 20, 47, 0.08);
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        backdrop-filter: blur(14px);
      }

      .links a:focus-visible {
        outline: 3px solid rgba(10, 132, 255, 0.35);
        outline-offset: 3px;
      }

      .links a:hover {
        border-color: rgba(10, 132, 255, 0.45);
        color: var(--blue);
      }

      @media (max-width: 640px) {
        .hero {
          width: 160vw;
          max-width: none;
          margin-left: 50%;
          transform: translateX(-50%);
        }

        .links {
          flex-direction: column;
          align-items: stretch;
          width: min(100% - 2rem, 18rem);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <img
          class="brand"
          src="public/images/vitre-ui-logo-1920x1080.webp"
          alt="Vitre UI"
        >

        <nav class="links" aria-label="Project packages">
          <a href="https://www.npmjs.com/package/vitre-css">vitre-css</a>
          <a href="https://www.npmjs.com/package/vitre-js">vitre-js</a>
        </nav>
      </div>
    </main>
  </body>
</html>
