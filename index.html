<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vitre UI</title>
    <meta
      name="description"
      content="Placeholder site for the Vitre CSS and Vitre JS projects."
    >
    <style>
      :root {
        color-scheme: dark;
        --ink: #08142f;
        --blue: #0a84ff;
        --line: rgba(8, 20, 47, 0.12);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        background: var(--ink);
      }

      main {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
      }

      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        max-width: 100vw;
        max-height: 100vh;
      }

      .brand {
        display: block;
        width: auto;
        height: auto;
        max-width: 100vw;
        max-height: 100vh;
      }

      .links {
        display: flex;
        gap: 0.875rem;
        justify-content: center;
        width: min(100% - 2rem, 34rem);
      }

      .links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 9.5rem;
        min-height: 3rem;
        padding: 0.75rem 1.1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 18px 50px rgba(8, 20, 47, 0.08);
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        backdrop-filter: blur(14px);
      }

      .links a:focus-visible {
        outline: 3px solid rgba(10, 132, 255, 0.35);
        outline-offset: 3px;
      }

      .links a:hover {
        border-color: rgba(10, 132, 255, 0.45);
        color: var(--blue);
      }

      @media (max-width: 640px) {
        .links {
          flex-direction: column;
          align-items: stretch;
          width: min(100% - 2rem, 18rem);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <img class="brand" src="/images/vitre-ui-dark.webp" alt="Vitre UI">

        <nav class="links" aria-label="Project packages">
          <a
            href="https://www.npmjs.com/package/vitre-css"
            target="_blank"
            rel="noopener noreferrer"
          >
            vitre-css
          </a>
          <a
            href="https://www.npmjs.com/package/vitre-js"
            target="_blank"
            rel="noopener noreferrer"
          >
            vitre-js
          </a>
        </nav>
      </div>
    </main>
  </body>
</html>
